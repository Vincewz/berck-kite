name: Détection kites YOLO

on:
  schedule:
    - cron: '20 8  * * *'   # 10:20 Paris (CEST UTC+2) — image XX:00 dispo ~XX:10
    - cron: '20 9  * * *'   # 11:20 Paris
    - cron: '20 10 * * *'   # 12:20 Paris
    - cron: '20 11 * * *'   # 13:20 Paris
    - cron: '20 12 * * *'   # 14:20 Paris
    - cron: '20 13 * * *'   # 15:20 Paris
    - cron: '20 14 * * *'   # 16:20 Paris
    - cron: '20 15 * * *'   # 17:20 Paris
  workflow_dispatch:

jobs:
  # ── Job 1 : vérification conditions (rapide, pas de torch) ─────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      conditions_ok: ${{ steps.cond.outputs.conditions_ok }}
      reason:        ${{ steps.cond.outputs.reason }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests --quiet

      - name: Vérifier conditions
        id: cond
        run: python kite-detector/scripts/check_conditions.py

  # ── Job 2 : inférence YOLO (uniquement si conditions OK) ───────────────────
  detect:
    needs: check
    if: needs.check.outputs.conditions_ok == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-yolo-${{ hashFiles('kite-detector/requirements.txt') }}
          restore-keys: pip-yolo-

      - name: Installer torch + ultralytics
        run: |
          pip install requests --quiet
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu --quiet
          pip install ultralytics --quiet

      - name: Détecter les kites
        run: python kite-detector/scripts/infer_kite.py

      - name: Commit résultat
        run: |
          git config user.name  "KiteBerck Bot"
          git config user.email "bot@berck.info"
          git add berck-kite/kite_status.json berck-kite/detection_history.json
          git diff --cached --quiet && echo "Aucun changement" && exit 0
          DATE=$(date +'%Y-%m-%d %H:%M')
          git commit -m "Détection kite ${DATE}"
          git push
