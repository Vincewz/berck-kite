<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>🪁 Kite Berck</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.1/dist/leaflet-velocity.min.css"/>
</head>
<body>
  <div id="app" v-cloak>

    <!-- ── STICKY NAV ── -->
    <nav>
      <span class="nav-logo">Kite<b>Berck</b></span>
      <span class="nav-update" v-if="lastUpdate">
        <span class="live-dot"></span> {{ timeAgo }}
      </span>
      <button class="nav-refresh" @click="fetchAll" :disabled="loading">
        <span :class="{spin: loading}">↺</span>
      </button>
    </nav>

    <!-- ── LOADER ── -->
    <div v-if="loading && !current" class="loader-screen">
      <div class="loader-bars"><span></span><span></span><span></span><span></span><span></span></div>
      <p>Chargement AROME…</p>
    </div>

    <template v-else-if="current">

      <!-- ═══════════════════════════════════════════
           HERO — vitesse + statut en un coup d'œil
      ════════════════════════════════════════════ -->
      <section class="hero" :class="heroClass"
        :style="heroBg ? { backgroundImage: 'url(' + heroBg + ')', backgroundPosition: 'center 38%' } : {}"
      >
        <div class="hero-main">
          <div class="hero-speed">{{ toKt(current.wind_speed_10m) }}</div>
          <div class="hero-unit">nœuds</div>
        </div>

        <div class="hero-sub">
          <div class="hero-dir">
            <svg class="mini-compass" viewBox="0 0 60 60">
              <circle cx="30" cy="30" r="28" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
              <g :transform="`rotate(${current.wind_direction_10m}, 30, 30)`" style="transition:transform .6s">
                <polygon points="30,8 33,28 30,34 27,28" fill="white" opacity=".9"/>
                <polygon points="30,34 33,28 30,52 27,28" fill="rgba(255,255,255,.3)"/>
              </g>
              <circle cx="30" cy="30" r="3" fill="white"/>
            </svg>
            <span>{{ dirLabel(current.wind_direction_10m) }} {{ current.wind_direction_10m }}°</span>
          </div>
          <div class="hero-gust">Rafales <b>{{ toKt(current.wind_gusts_10m) }} nœuds</b></div>
        </div>

        <!-- ── BOUTON PARTAGE ── -->
        <button class="share-btn" @click="shareConditions" title="Partager les conditions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </button>

        <!-- ── PODCAST PLAYER ── -->
        <div class="podcast-bar" id="podcastBar">
          <button class="podcast-btn" id="podcastBtn" onclick="togglePodcast()">
            <span id="podcastIcon">▶</span>
          </button>
          <div class="podcast-info">
            <span class="podcast-label">🎙️ Report du jour</span>
            <div class="podcast-progress">
              <div class="podcast-fill" id="podcastFill"></div>
            </div>
          </div>
          <audio id="podcastAudio" src="podcast/today.mp3" preload="none"
            ontimeupdate="updatePodcastProgress()"
            onended="podcastEnded()"></audio>
        </div>
      </section>

      <!-- ═══════════════════════════════════════════
           5 INFOS — 2 colonnes, vent de terre en premier
      ════════════════════════════════════════════ -->
      <section class="questions-grid">

        <!-- Vent de terre ou mer — PLEINE LARGEUR, info critique -->
        <div class="q-card q-wind-origin" :class="windOrigin.cls">
          <div class="q-label">Vent de terre ou mer ?</div>
          <div class="q-origin-body">
            <span class="q-origin-icon">{{ windOrigin.icon }}</span>
            <div class="q-origin-text">
              <div class="q-answer">{{ windOrigin.label }}</div>
              <div class="q-sub">{{ windOrigin.description }}</div>
            </div>
            <div class="q-origin-dir">
              {{ dirLabel(current.wind_direction_10m) }}&nbsp;{{ current.wind_direction_10m }}°
            </div>
          </div>
        </div>

        <!-- Météo à venir -->
        <div class="q-card q-weather" v-if="weatherForecast">
          <div class="q-label">Météo</div>
          <div class="weather-top">
            <div class="weather-temp">{{ weatherForecast.currTemp }}°</div>
            <div class="sea-temp" v-if="seaTemp !== null">🌊 <b>{{ seaTemp }}°C</b></div>
          </div>
          <div class="weather-slots">
            <div class="weather-slot" v-for="s in weatherForecast.slots" :key="s.hour">
              <span class="ws-hour">{{ s.hour }}</span>
              <span class="ws-icon">{{ s.icon }}</span>
              <span class="ws-temp">{{ s.temp }}°</span>
              <span class="ws-prob" v-if="s.prob > 10">{{ s.prob }}%</span>
            </div>
          </div>
        </div>

        <!-- Vagues -->
        <div class="q-card q-waves" :class="waveInfo.cls">
          <div class="q-label">Vagues</div>
          <div class="wave-display">
            <span class="wave-h-num">{{ waveInfo.h }}</span><span class="wave-h-unit">m</span>
          </div>
          <div class="wave-bars">
            <div v-for="(b, i) in waveInfo.bars" :key="i"
              class="wave-bar"
              :style="{ height: b + '%', animationDelay: (i * 0.18) + 's' }">
            </div>
          </div>
          <div class="q-sub">{{ waveInfo.period !== '—' ? waveInfo.period + 's · ' : '' }}{{ waveInfo.label }}</div>
        </div>

        <!-- Prochains jours -->
        <div class="q-card">
          <div class="q-label">Prochains jours</div>
          <div class="q-weekend" v-if="nextDays.length">
            <div v-for="d in nextDays.slice(1, 6)" :key="d.label" class="q-wday">
              <span class="wday-label">{{ d.label }}</span>
              <div class="wday-bar-wrap">
                <div class="wday-bar" :style="{ width: Math.min(100, d.kt/40*100)+'%', background: d.color }"></div>
              </div>
              <span class="wday-kt" :style="{ color: d.color }">{{ d.kt }}kt</span>
              <span class="wday-dir">{{ d.dir }}</span>
              <span v-if="d.offshore === true" class="wday-offshore">⚠ terre</span>
            </div>
          </div>
          <div class="q-answer" v-else>Pas de données</div>
        </div>

        <!-- Marées — visualisation plage (pleine largeur) -->
        <div class="q-card q-tides">
          <div class="q-label">Marées</div>
          <!-- Visualisation CSS marée -->
          <div class="tide-visual">
            <div class="tide-visual-sky"></div>
            <div class="tide-visual-sea" :style="{ height: (tideNow.pct * 100) + '%' }">
              <div class="tide-visual-foam"></div>
            </div>
            <div class="tide-visual-sand"></div>
            <span class="tide-visual-label">{{ tideNow.h }}m</span>
          </div>

          <!-- ── JAUGE HORIZONTALE ── -->
          <div class="tide-hbar">
            <span class="tide-hbar-lbl lw">▽ BM</span>
            <div class="tide-hbar-track">
              <div class="tide-hbar-fill" :style="{ width: (tideNow.pct * 100) + '%' }"></div>
              <div class="tide-hbar-dot" :style="{ left: (tideNow.pct * 100) + '%' }">
                <span class="tide-hbar-val">{{ tideNow.h }}m</span>
              </div>
              <!-- tick mi-marée -->
              <div class="tide-hbar-tick"></div>
            </div>
            <span class="tide-hbar-lbl hw">▲ PM</span>
          </div>

          <!-- Coefficient -->
          <div class="tide-coeff-row">
            <span class="tide-coeff-val">{{ tideNow.coeff }}</span>
            <span class="tide-coeff-label" :class="tideNow.coeffCls">{{ tideNow.coeffLabel }}</span>
            <div class="tide-coeff-bar">
              <div class="tide-coeff-fill" :class="tideNow.coeffCls" :style="{ width: ((tideNow.coeff - 20) / 100 * 100) + '%' }"></div>
            </div>
          </div>

          <!-- Prochains PM/BM -->
          <template v-if="tides.length">
            <div class="q-tide-row" v-for="t in tides.slice(0,4)" :key="t.t">
              <span class="q-tide-type" :class="t.type === 'HW' ? 'hw' : 'lw'">
                {{ t.type === 'HW' ? '▲ PM' : '▽ BM' }}
              </span>
              <span class="q-tide-time">{{ t.timeStr }}</span>
              <span class="q-tide-h">{{ t.hStr }}m</span>
            </div>
          </template>
        </div>


      </section>

      <!-- ═══════════════════════════════════════════
           GRAPHIQUE 24H
      ════════════════════════════════════════════ -->
      <section class="chart-section">
        <div class="section-title">Vent 24h <span class="badge-arome">AROME 1.3km</span></div>
        <div class="chart-wrap">
          <canvas id="windChart"></canvas>
        </div>
      </section>

      <!-- ═══════════════════════════════════════════
           CARTE VENT LOCALE
      ════════════════════════════════════════════ -->
      <section class="map-section">
        <div class="section-title">🗺️ Carte vent <span class="badge-arome">AROME</span></div>
        <div id="berck-map"></div>
      </section>

      <!-- ═══════════════════════════════════════════
           DÉTAIL HORAIRE — sélecteur de jour
      ════════════════════════════════════════════ -->
      <section class="days-detail" v-if="allDaysHourly.length">
        <div class="section-title">Détail horaire</div>
        <div class="day-tabs">
          <button
            v-for="(day, i) in allDaysHourly" :key="i"
            class="day-tab" :class="{ active: selectedDayIdx === i }"
            @click="selectedDayIdx = i">
            {{ day.tabLabel }}
          </button>
        </div>
        <div class="day-slots" v-if="selectedDayHourly">
          <div class="day-slot" v-for="h in selectedDayHourly.slots" :key="h.hour" :class="{ 'slot-past': h.isPast }">
            <span class="slot-hour">{{ h.hour }}</span>
            <div class="slot-bar-wrap">
              <div class="slot-bar" :style="{ width: Math.min(100, h.kt/40*100)+'%', opacity: h.isPast ? 0.3 : 1, background: speedColor(h.speed) }"></div>
            </div>
            <span class="slot-kt" :style="{ color: h.isPast ? 'var(--muted)' : speedColor(h.speed) }">{{ h.kt }}kt</span>
            <span class="slot-gust">↑{{ h.gkt }}kt</span>
            <span class="slot-dir">{{ dirLabel(h.dir) }}</span>
          </div>
        </div>
      </section>

      <!-- ═══════════════════════════════════════════
           WEBCAMS — scroll horizontal
      ════════════════════════════════════════════ -->
      <section class="webcam-section">
        <div class="section-title">📷 Webcams live</div>
        <div class="webcam-scroll">
          <div class="webcam-thumb" v-for="cam in WEBCAMS" :key="cam.slug" @click="openCam(cam)">
            <div class="webcam-preview">
              <img :src="snapUrl(cam.slug)" :alt="cam.label"
                @load="e => e.target.classList.add('loaded')"
                @error="e => { if(!e.target._tried){ e.target._tried=true; e.target.src=snapUrl(cam.slug,1) } else { e.target.src='cams/'+cam.slug+'.jpg' } }"
                loading="lazy"/>
              <div class="webcam-live-badge">● LIVE</div>
            </div>
            <div class="webcam-name">{{ cam.label }}</div>
          </div>
        </div>
      </section>

    </template>

    <!-- ERROR -->
    <div v-else-if="error" class="error-screen">
      <p>⚠ {{ error }}</p>
      <button @click="fetchAll">Réessayer</button>
    </div>

    <!-- TOAST PARTAGE -->
    <div class="share-toast" :class="{ visible: shareToast }">✓ Copié dans le presse-papier</div>

    <!-- MODAL CAM -->
    <div class="modal-bg" v-if="activeCam" @click.self="activeCam = null">
      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title">
            <span class="modal-live-dot"></span>
            {{ activeCam.label }}
          </div>
          <button class="modal-close" @click="activeCam = null">✕</button>
        </div>
        <div class="modal-iframe-wrap">
          <iframe :src="`https://www.skaping.com/berck-sur-mer/${activeCam.slug}`"
            frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="modal-footer">
          <span>📍 Berck-sur-Mer</span>
          <a :href="`https://www.skaping.com/berck-sur-mer/${activeCam.slug}`" target="_blank">Ouvrir ↗</a>
        </div>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-velocity@2.1.1/dist/leaflet-velocity.min.js"></script>
  <script src="app.js"></script>
  <script>
    // ── Podcast player ──────────────────────────────────────────────────────
    function togglePodcast() {
      const audio = document.getElementById('podcastAudio');
      const icon  = document.getElementById('podcastIcon');
      if (!audio) return;
      if (audio.paused) {
        audio.play().then(() => { icon.textContent = '❚❚'; }).catch(() => {});
      } else {
        audio.pause();
        icon.textContent = '▶';
      }
    }
    function updatePodcastProgress() {
      const audio = document.getElementById('podcastAudio');
      const fill  = document.getElementById('podcastFill');
      if (!audio || !fill || !audio.duration) return;
      fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    }
    function podcastEnded() {
      const icon = document.getElementById('podcastIcon');
      const fill = document.getElementById('podcastFill');
      if (icon) icon.textContent = '▶';
      if (fill) fill.style.width = '0%';
    }
    // Masquer le player si le fichier n'existe pas
    window.addEventListener('DOMContentLoaded', () => {
      const audio = document.getElementById('podcastAudio');
      const bar   = document.getElementById('podcastBar');
      if (!audio || !bar) return;
      audio.addEventListener('error', () => { bar.style.display = 'none'; });
    });
  </script>
</body>
</html>
